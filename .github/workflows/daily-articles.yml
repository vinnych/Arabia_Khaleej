name: Daily Article Generation

on:
  schedule:
    # Runs every hour on the hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  trigger-automation:
    runs-on: ubuntu-latest
    steps:
      - name: Hit Master Digest Endpoint
        run: |
          if [ -z "${{ secrets.PRODUCTION_URL }}" ]; then
            echo "Error: PRODUCTION_URL secret is not set."
            exit 1
          fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "Error: CRON_SECRET secret is not set."
            exit 1
          fi
          
          # Hit the endpoint and log status
          curl -f --max-time 55 -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.PRODUCTION_URL }}/api/admin/daily-automation?action=master-digest"
