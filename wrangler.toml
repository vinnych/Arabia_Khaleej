# Arabia Khaleej — Wrangler Workers configuration (OpenNext adapter)
# Why this file changed from next-on-pages to @opennextjs/cloudflare:
# 1. @cloudflare/next-on-pages is deprecated and broken with Next.js 15.4+.
#    It targets Cloudflare Pages' Edge Runtime which has significant API limitations.
# 2. @opennextjs/cloudflare targets Cloudflare Workers with nodejs_compat, giving us
#    full Node.js API access (crypto, streams, etc.) and proper D1 binding support.
# 3. The output directory changes from .vercel/output → .open-next/worker.js,
#    which is a native Cloudflare Worker script instead of a Pages Functions bundle.

name = "arabia-khaleej"
main = ".open-next/worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Why assets instead of pages_build_output_dir:
# Workers use the assets binding to serve static files from the .open-next/assets directory,
# whereas Pages used a pages_build_output_dir pointing at the Vercel output format.
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "arabiakhaleej-db"
database_id = "258ef468-a2f0-4628-bb04-4d782a7d4d24"

[vars]
CONTACT_WORKER_URL = "https://arabiakhaleej-contact.asishchilakapati.workers.dev"
NEXT_PUBLIC_SITE_URL = "https://arabiakhaleej.com"
NEXT_PUBLIC_ADSENSE_ID = "ca-pub-7212871157824722"
NEXT_PUBLIC_SITE_VERIFICATION = "61758f95d085e67d"
