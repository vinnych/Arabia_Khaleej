# wrangler.toml
# Arabia Khaleej — Automation Worker Wrangler Configuration
# Why this particular is used:
# - Cloudflare Wrangler reads deployment targets, compatibility details, and scheduled triggers from toml.
# - Explicitly setting a "0 */2 * * *" triggers block ensures Cloudflare schedules cron executions every 2 hours natively.

name = "arabiakhaleej-automation"
main = "daily-automation.js"
compatibility_date = "2025-02-04"

[triggers]
# Execute every 2 hours (02:00, 04:00, etc.) to scan trends and trigger articles generation
crons = ["0 */2 * * *"]
