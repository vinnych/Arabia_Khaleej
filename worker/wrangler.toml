name = "arabiakhaleej-automation"
main = "daily-automation.js"
compatibility_date = "2024-04-01"

[triggers]
 crons = ["0 */2 * * *"] # Run every 2 hours

# Environment Variables (Non-sensitive)
[vars]
# Add any non-sensitive variables here

