name = "arabiakhaleej-automation"
main = "daily-automation.js"
compatibility_date = "2025-02-04"

# Single cron schedule:
#   */15 * * * *  — fires at minutes 0, 15, 30, 45 → triggers article generation via /api/cron/generate
#
# Why a single */15 schedule works perfectly:
#   Because Render's inactivity timeout is exactly 15 minutes, triggering an article
#   generation every 15 minutes (4 times per hour) naturally keeps the Render agent warm.
#   This eliminates the need for separate keep-alive pings or dual schedules, 
#   simplifying worker architecture while ensuring zero cold starts.
#
# IMPORTANT: After deploying, set the CRON_SECRET worker secret:
#   npx wrangler secret put CRON_SECRET --config worker/wrangler-automation.toml
[triggers]
crons = ["*/15 * * * *"]

# Observability: logs enabled, traces disabled (saves quota on free tier)
[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = false
head_sampling_rate = 1
