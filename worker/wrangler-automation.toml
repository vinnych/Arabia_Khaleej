name = "arabiakhaleej-automation"
main = "daily-automation.js"
compatibility_date = "2025-02-04"

# Single cron schedule:
#   0 */3 * * *  — fires once every 3 hours (at minute 0) → triggers article generation.
#   Why once every 3 hours: Conserves API quota and database writes while keeping feed fresh.
#
# IMPORTANT: After deploying, set the CRON_SECRET worker secret:
#   npx wrangler secret put CRON_SECRET --config worker/wrangler-automation.toml
[triggers]
crons = ["0 */3 * * *"]

# Observability: logs enabled, traces disabled (saves quota on free tier)
[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = false
head_sampling_rate = 1
