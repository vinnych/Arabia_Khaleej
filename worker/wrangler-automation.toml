name = "arabiakhaleej-automation"
main = "daily-automation.js"
compatibility_date = "2025-02-04"

# Dual schedule for preventing cold starts and generating articles
[triggers]
crons = ["*/14 * * * *", "*/30 * * * *"]

# Note: Set your CRON_SECRET securely using:
# npx wrangler secret put CRON_SECRET --config worker/wrangler-automation.toml

# Observability settings consistent with Cloudflare dashboard to persist logs
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
